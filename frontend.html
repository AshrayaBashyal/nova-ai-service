<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.0 Flash - Professional AI Interface</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f0f2f5;
            --chat-bg: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --user-bubble: #1a73e8;
            --ai-bubble: #f1f3f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* Header & Settings */
        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .settings-btn {
            cursor: pointer;
            font-size: 1.4rem;
            background: none;
            border: none;
            padding: 10px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .settings-btn:hover { background: #e0e0e0; }

        /* System Prompt Drawer */
        #systemDrawer {
            display: none;
            width: calc(100% - 40px);
            max-width: 860px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #dadce0;
        }

        .drawer-label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .system-input-group {
            display: flex;
            gap: 10px;
        }

        .system-input-group input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            outline: none;
        }

        /* Main Chat Container */
        .chat-container {
            width: 100%;
            max-width: 900px;
            flex: 1;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Code Block Styling */
        pre {
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9rem;
        }

        /* Footer Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #f1f3f4;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #dadce0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .input-area input:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Metrics Bar */
        .metrics-bar {
            display: flex;
            justify-content: space-between;
            padding: 5px 25px;
            background: #fff;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: var(--primary);">Gemini 2.0 Flash</h2>
        <button class="settings-btn" onclick="toggleSystem()" title="System Instructions">⚙️</button>
    </div>

    <div id="systemDrawer">
        <span class="drawer-label">System Instructions</span>
        <div class="system-input-group">
            <input type="text" id="systemInput" placeholder="Ex: 'Answer like a senior coder' or 'Keep it brief'...">
            <button class="send-btn" onclick="toggleSystem()" style="background:#5f6368">Save</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chatbox">
            <div class="message ai-msg">Hello! I'm optimized for Gemini 2.0 Flash. How can I help you today?</div>
        </div>

        <div class="metrics-bar">
            <span id="tokenCount">Tokens: 0</span>
            <span id="latency">Latency: 0ms</span>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api/v1/chat/stream";
        let isThinking = false;

        function toggleSystem() {
            const drawer = document.getElementById('systemDrawer');
            drawer.style.display = drawer.style.display === 'block' ? 'none' : 'block';
        }

        async function sendMessage() {
            if (isThinking) return;

            const inputField = document.getElementById('userInput');
            const chatbox = document.getElementById('chatbox');
            const systemInputField = document.getElementById('systemInput');
            
            const userText = inputField.value.trim();
            if (!userText) return;

            // 1. Prepare UI
            isThinking = true;
            inputField.value = '';
            document.getElementById('sendBtn').disabled = true;

            // Add User Bubble
            chatbox.innerHTML += `<div class="message user-msg">${userText}</div>`;
            
            // Add Placeholder AI Bubble
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'message ai-msg';
            chatbox.appendChild(aiMsgDiv);
            chatbox.scrollTop = chatbox.scrollHeight;

            let accumulatedContent = "";

            try {
                // 2. Fetch with Streaming
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: userText }],
                        system_prompt: systemInputField.value.trim() || "You are a helpful assistant.",
                        temperature: 0.7
                    })
                });

                // Display Latency from your Middleware
                const backendLatency = response.headers.get('X-Response-Time-Ms');
                if (backendLatency) {
                    document.getElementById('latency').innerText = `Latency: ${parseFloat(backendLatency).toFixed(1)}ms`;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        
                        try {
                            const data = JSON.parse(line);

                            if (data.type === 'chunk') {
                                accumulatedContent += data.text;
                                // Use marked.js to render Markdown in real-time
                                aiMsgDiv.innerHTML = marked.parse(accumulatedContent);
                                chatbox.scrollTop = chatbox.scrollHeight;
                            } 
                            else if (data.type === 'usage') {
                                document.getElementById('tokenCount').innerText = `Tokens: ${data.usage.total_tokens}`;
                            }
                            else if (data.type === 'error') {
                                aiMsgDiv.innerHTML = `<span style="color:red">API Error: ${data.message}</span>`;
                            }
                        } catch (e) {
                            console.error("Error parsing stream line:", line);
                        }
                    }
                }
            } catch (err) {
                aiMsgDiv.innerHTML = `<span style="color:red">Network Error: ${err.message}</span>`;
            } finally {
                isThinking = false;
                document.getElementById('sendBtn').disabled = false;
                inputField.focus();
            }
        }

        // Allow 'Enter' key to send
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
