<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Chat UI</title>
<style>
  body { font-family: Arial, sans-serif; background:#f2f2f2; padding:20px; }
  h2 { margin-top:40px; }
  .section { background:#fff; padding:15px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  .messages { border:1px solid #ccc; border-radius:8px; height:200px; overflow-y:auto; padding:10px; margin-bottom:10px; background:#fafafa;}
  .messages p { margin:5px 0; }
  .messages p.user { font-weight:bold; color:#007bff; }
  .messages p.model { font-weight:normal; color:#000; }
  .input-area { display:flex; gap:5px; }
  .input-area input { flex:1; padding:6px; border-radius:8px; border:1px solid #ccc; }
  .input-area button { padding:6px 12px; border:none; border-radius:8px; background:#007bff; color:#fff; cursor:pointer; }
  .tokens { font-size:0.9em; color:#555; margin-top:5px; }
  label { font-weight:bold; display:block; margin-bottom:5px; }
</style>
</head>
<body>

<h1>Gemini Chat UI</h1>

<!-- Chat Stream Section -->
<div class="section">
  <h2>Chat Stream</h2>
  <label>System Prompt:</label>
  <input type="text" id="streamSystemPrompt" placeholder="System prompt...">
  <div class="messages" id="chatStream"></div>
  <div class="input-area">
    <input type="text" id="streamInput" placeholder="Type your message...">
    <button onclick="sendStream()">Send</button>
  </div>
  <div class="tokens" id="streamTokens"></div>
</div>

<!-- Chat Full Section -->
<div class="section">
  <h2>Chat Full</h2>
  <label>System Prompt:</label>
  <input type="text" id="fullSystemPrompt" placeholder="System prompt...">
  <div class="messages" id="chatFull"></div>
  <div class="input-area">
    <input type="text" id="fullInput" placeholder="Type your message...">
    <button onclick="sendFull()">Send</button>
  </div>
  <div class="tokens" id="fullTokens"></div>
</div>

<!-- Token Counter Section -->
<div class="section">
  <h2>Token Counter</h2>
  <textarea id="tokenText" rows="4" placeholder="Paste your text here..." style="width:100%; padding:6px; border-radius:8px; border:1px solid #ccc;"></textarea>
  <button onclick="countTokens()" style="margin-top:5px;">Count Tokens</button>
  <div class="tokens" id="tokenResult"></div>
</div>

<script>
const BASE_URL = "http://127.0.0.1:8000/api/v1";

// Utility: scroll to bottom
function scrollToBottom(container) {
    container.scrollTop = container.scrollHeight;
}

// Chat Stream
async function sendStream() {
    const message = document.getElementById("streamInput").value;
    const sysPrompt = document.getElementById("streamSystemPrompt").value || "Explain it like a pro.";
    if (!message) return;
    const container = document.getElementById("chatStream");
    const tokenDiv = document.getElementById("streamTokens");

    // Add user message
    const pUser = document.createElement("p");
    pUser.className = "user";
    pUser.textContent = "USER: " + message;
    container.appendChild(pUser);
    scrollToBottom(container);
    document.getElementById("streamInput").value = "";

    try {
        const response = await fetch(BASE_URL + "/chat/stream", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                messages: [{role:"user", content: message}],
                system_prompt: sysPrompt,
                include_usage: true
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let { value, done } = await reader.read();
        let buffer = "";
        const pModel = document.createElement("p");
        pModel.className = "model";
        container.appendChild(pModel);

        while (!done) {
            buffer += decoder.decode(value, {stream:true});
            let lines = buffer.split("\n");
            buffer = lines.pop(); // keep last incomplete line
            for (const line of lines) {
                if (!line) continue;
                const data = JSON.parse(line);
                if (data.type === "chunk") {
                    // typing effect per character
                    for (const ch of data.text) {
                        pModel.textContent += ch;
                        scrollToBottom(container);
                        await new Promise(r => setTimeout(r, 5)); // 5ms per char
                    }
                } else if (data.type === "usage") {
                    tokenDiv.textContent = `Tokens - Input: ${data.usage.input_tokens}, Output: ${data.usage.output_tokens}, Total: ${data.usage.total_tokens}`;
                }
            }
            ({ value, done } = await reader.read());
        }
        // parse any leftover
        if (buffer) {
            const data = JSON.parse(buffer);
            if (data.type === "usage") {
                tokenDiv.textContent = `Tokens - Input: ${data.usage.input_tokens}, Output: ${data.usage.output_tokens}, Total: ${data.usage.total_tokens}`;
            }
        }
    } catch (err) {
        const pErr = document.createElement("p");
        pErr.className = "model";
        pErr.textContent = "Error: " + err;
        container.appendChild(pErr);
    }
}

// Chat Full
async function sendFull() {
    const message = document.getElementById("fullInput").value;
    const sysPrompt = document.getElementById("fullSystemPrompt").value || "Explain it like a pro.";
    if (!message) return;
    const container = document.getElementById("chatFull");
    const tokenDiv = document.getElementById("fullTokens");

    const pUser = document.createElement("p");
    pUser.className = "user";
    pUser.textContent = "USER: " + message;
    container.appendChild(pUser);
    scrollToBottom(container);
    document.getElementById("fullInput").value = "";

    try {
        const res = await fetch(BASE_URL + "/chat/full", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                messages: [{role:"user", content: message}],
                system_prompt: sysPrompt
            })
        });
        const data = await res.json();
        const pModel = document.createElement("p");
        pModel.className = "model";
        pModel.textContent = "MODEL: " + data.content;
        container.appendChild(pModel);
        tokenDiv.textContent = `Tokens - Input: ${data.usage.input_tokens}, Output: ${data.usage.output_tokens}, Total: ${data.usage.total_tokens}`;
        scrollToBottom(container);
    } catch (err) {
        const pErr = document.createElement("p");
        pErr.className = "model";
        pErr.textContent = "Error: " + err;
        container.appendChild(pErr);
    }
}

// Token Counter
async function countTokens() {
    const text = document.getElementById("tokenText").value;
    const resultDiv = document.getElementById("tokenResult");
    if (!text) return;
    try {
        const res = await fetch(BASE_URL + "/tokens/count", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({text})
        });
        const data = await res.json();
        resultDiv.textContent = `Tokens: ${data.tokens}, Text Length: ${data.text_length}`;
    } catch(err) {
        resultDiv.textContent = "Error: " + err;
    }
}
</script>

</body>
</html>
